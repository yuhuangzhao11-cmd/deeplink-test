<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H5 JSAPI Test</title>
</head>
<body style="padding: 50px; text-align: center;">

    <button id="jumpBtn" style="width: 100%; height: 60px; background: #1677ff; color: white; border: none; border-radius: 8px; font-size: 18px;">
        使用 Bridge 跳转
    </button>

    <script>
        document.getElementById('jumpBtn').onclick = function() {
            // 按照截图中的写法：判断是否存在，然后直接调用
            if (window.AlipayJSBridge) {
                AlipayJSBridge.call('navigateToMiniProgram', {
                    appId: '3482020229287147',
                    // H5+ 小程序跳转通常建议带上这个参数，空字符串代表首页
                    appendedUrlPart: '' 
                }, function(data) {
                    // 这里的 data 就是回调结果
                    console.log('Result: ' + JSON.stringify(data));
                    if (data.error) {
                        alert('跳转失败代码: ' + data.error);
                    }
                });
            } else {
                // 如果没加载好，监听 ready 事件后再试
                alert('Bridge 尚未准备好，请稍后再试');
            }
        };

        // 建议增加这个监听，确保 Bridge 注入成功
        document.addEventListener('AlipayJSBridgeReady', function() {
            console.log('AlipayJSBridge 已经就绪');
        }, false);
    </script>
</body>
</html>
